name: Publish anonymous project page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the display-only repository
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Assemble public artifact
        run: |
          mkdir _site
          cp index.html style.css script.js _site/
          cp -R pic video posters third_view assets _site/
          touch _site/.nojekyll
      - name: Upload the static page
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy the page
        id: deployment
        uses: actions/deploy-pages@v4
